# ==============================================================================
# docs/nginx_fleet_telematics_sse.conf
#
# ทีม Backend ยืนยันแล้ว (2026-06-30): ไม่มี reverse proxy (nginx) อยู่ใน
# repo ของ Backend เลย — docker-compose มีแค่ backend/timescaledb/emqx
# Backend expose ตรงผ่าน Uvicorn เท่านั้น ไม่มีใครตั้ง idle/read timeout ไว้
#
# ดังนั้นฝั่ง Odoo/Infra ต้องเตรียม config นี้เอง ครอบคลุม 2 จุด:
#   (1) ถ้า production มี reverse proxy คั่นระหว่าง browser <-> Odoo
#       ต้องไม่ buffer route /fleet_telematics/live_proxy (controller ใหม่
#       ที่เพิ่มใน controllers/main.py)
#   (2) ถ้ามีการเพิ่ม reverse proxy คั่นระหว่าง Odoo <-> Backend ในอนาคต
#       ต้องตั้งค่าเดียวกันสำหรับ /api/v1/fleet/live ของ Backend ด้วย
#
# อย่ารอ config จากทีม Backend — ตามโค้ดที่ตรวจสอบแล้วไม่มีให้แน่นอน
# ==============================================================================

# (1) หน้า Odoo เอง — ถ้ามี nginx อยู่หน้า Odoo web server
location /fleet_telematics/live_proxy {
    proxy_pass http://odoo:8069;        # ปรับ upstream ตาม service name จริง
    proxy_http_version 1.1;
    proxy_buffering off;                # สำคัญที่สุด — ปิด buffer ไม่งั้น SSE ค้าง
    proxy_cache off;
    proxy_read_timeout 3600s;           # connection ค้างได้นาน (ไม่มี timeout จาก Backend)
    proxy_set_header Connection '';
    chunked_transfer_encoding off;
    add_header X-Accel-Buffering no;    # เผื่อ nginx เวอร์ชันเก่าไม่อ่าน header จาก upstream
}

# (2) ถ้าในอนาคตมี reverse proxy คั่นระหว่าง Odoo <-> Backend โดยตรง
#     (ปัจจุบัน Odoo เรียก Backend ตรงผ่าน requests library ไม่ผ่าน proxy นี้
#      แต่เผื่อทีม Infra เปลี่ยนสถาปัตยกรรมในอนาคต)
location /api/v1/fleet/live {
    proxy_pass http://backend:8000;     # ปรับ upstream ตาม service name จริงของ Backend
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_set_header Connection '';
    chunked_transfer_encoding off;
}

# หมายเหตุ: ถ้า deploy ผ่าน Cloudflare/ALB เพิ่มอีกชั้น ต้องเช็ค idle timeout
# ของชั้นนั้นแยกต่างหาก (เช่น ALB default idle timeout = 60s ต้องปรับเพิ่ม
# เป็นอย่างน้อย 3600s เช่นกัน ไม่งั้น SSE จะหลุดทุก 60 วินาทีโดยไม่เกี่ยวกับ
# nginx config ด้านบนเลย)
